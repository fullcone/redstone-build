# Redstone LLDP advertise config (lldpd loads /etc/lldpd.d/*.conf at start).

configure system platform "Redstone R0768-F0002-00 (P2020 + BCM56846)"
configure system description "OpenWrt 22.03 / EdgeNOS 5.10 hybrid switch"
configure lldp tx-interval 30
configure lldp tx-hold 4
configure med fast-start tx-interval 1
configure med fast-start enable
