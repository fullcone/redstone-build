! Redstone switch — minimal FRR config (placeholder, ops customizes per-deployment)
! Generated by redstone-build P3 diy-script.

frr version 8.4
frr defaults traditional
hostname redstone
log syslog informational
service integrated-vtysh-config

!
! Loopback (router-id source for OSPF/BGP)
!
interface lo
 ip address 10.255.255.1/32
!

!
! Example BGP — disabled by default. Uncomment + set ASN to enable.
!
! router bgp 65000
!  bgp router-id 10.255.255.1
!  no bgp ebgp-requires-policy
!  neighbor 10.0.0.2 remote-as 65001
!

!
! Example OSPF — disabled by default.
!
! router ospf
!  ospf router-id 10.255.255.1
!  network 10.0.0.0/24 area 0
!

line vty
!
