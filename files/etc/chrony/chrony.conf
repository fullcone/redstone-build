# Redstone chronyd — sync from upstream pool, serve to mgmt subnet.

# Upstream
pool 2.openwrt.pool.ntp.org iburst
pool pool.ntp.org           iburst

# Local serving on mgmt LAN (192.168.100.0/24)
allow 192.168.100.0/24

# Use NTS where available
authselectmode require

# Drift / log
driftfile /var/lib/chrony/drift
logdir    /var/log/chrony
maxupdateskew 100.0

# Step clock if drift > 1s in first 3 updates (boot RTC may be wildly off)
makestep 1.0 3

# Write back to RTC every 11 minutes
rtcsync
