# Redstone snmpd — minimal v2c read-only + v3 read-only template.
# OPS: change community / v3 user before exposing on production network.

# v2c read-only
rocommunity public default

# v3 read-only user (placeholder — set with `snmpusm -v 3 ...` post-deploy)
# createUser readonly SHA "ChangeMeChangeMe" AES "ChangeMeChangeMe"
# rouser     readonly priv

# System info
sysLocation    "Redstone (R0768-F0002-00) — set per deployment"
sysContact     "ops@example.com"
sysServices    72   # full L3 + applications

# Allow snmpd to bind on all interfaces
agentaddress  udp:161

# Disable AgentX (no separate sub-agents in this image)
master  no
